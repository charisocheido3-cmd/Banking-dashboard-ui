<h2 style="color: rgb(255, 255, 255);"> <span style="font-size: 30px;">&#9881;</span>Settings</h2> 
 
<button style="background-image:linear-gradient(to right,rgb(35, 35, 164),blue);color:white;padding:20px 40px;border:none;border-radius:8px; font-size:15px">Back</button>

<h3 style="color: #ffffff;">UI preferences</h3>
<div style="background-color: rgb(45, 52, 184);padding:20px 50px; border-radius:10px; gap:7px" >
<div>
<h3 style="color: rgb(255, 255, 255);"></h3>
<form>
<div>
 <label for="theme">Theme:</label>
 <select name="theme" id="theme" style="padding: 10px 40px;border-radius: 8px;" >

    <option style="background-color: darkgray;" value="dark" >Dark</option> 
 </select>
 </div>
 </div>

 <div >
<label for="language">Language:</label>
 <select style="padding: 10px 20px;border-radius: 8px;" name="language" id="language">
    <option  value="en">English</option>
    <option value="es">Spanish</option>
    <option value="po">Portuguese</option>
    <option value="fr">French</option>
    <option value="ch">Chinese</option>
    <option value="ja">Japanese</option>
    <option value="ge">German</option>
 </select>
 </div>
<br>
 <div>

    <div style="background-color: rgb(255, 255, 255); border-radius:8px; padding:10px 10px;margin-top:5px">

    <label style="font-size: 15px; color:rgb(20, 217, 59)" for="yes">YES</label>
    <input  type="radio" id="yes" name="show_recent" value="yes">
    <br>
    <label style="font-size: 15px; color:red" for="no">NO</label>
    <input type="radio" id="no" name="show_recent" value="no">
</div>
</div>

 </div>

            <option value="">jamesghh@gmail.com</option>

            <option value="">Cameron448e@gmail.com</option>
            <option value="">davengrinf788@gmail.com</option>
